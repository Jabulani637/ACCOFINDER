<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your free AccoFinder account to find verified student accommodation near your campus." />
  <title>Create Account – AccoFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <!-- Brand -->
      <div class="brand-row">
        <div class="brand">
          <div class="brand-badge">A</div>
          <div>
            <div class="brand-title">ACCOFINDER</div>
            <div class="brand-sub">Accommodation System</div>
          </div>
        </div>
      </div>

      <h1 class="title">Create an account</h1>
      <p class="subtitle">Sign up in just a few steps — it's free.</p>

      <!-- Error Banner -->
      <div id="errorBanner" class="error-banner" style="display:none;"></div>

      <form id="registerForm" autocomplete="on">
        <div class="row-2">
          <div class="field">
            <label for="firstName">First name</label>
            <input id="firstName" name="firstName" type="text" placeholder="First name" required />
          </div>
          <div class="field">
            <label for="lastName">Last name</label>
            <input id="lastName" name="lastName" type="text" placeholder="Last name" required />
          </div>
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <input id="email" name="email" type="email" placeholder="Email address" required />
        </div>

        <div class="field">
          <label for="password">New password</label>
          <input id="password" name="password" type="password" placeholder="New password (min 6 chars)" required minlength="6" />
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm password" required minlength="6" />
          <div class="hint" id="passwordHint" style="display:none;">Passwords do not match.</div>
        </div>

        <div class="row-2">
          <div class="field">
            <label for="role">I am a</label>
            <select id="role" name="role" required>
              <option value="student" selected>Student</option>
              <option value="owner">Property Owner</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="field">
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
              <option value="unspecified" selected>Prefer not to say</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="row-2">
          <div class="field">
            <label for="city">Preferred city</label>
            <select id="city" name="city" required>
              <option value="" disabled selected>Select city</option>
              <option value="Johannesburg">Johannesburg</option>
              <option value="Cape Town">Cape Town</option>
              <option value="Durban">Durban</option>
              <option value="Pretoria">Pretoria</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="field">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" placeholder="Phone number" required />
          </div>
        </div>

        <button id="submitBtn" class="primary-btn" type="submit">Create Account</button>

        <div class="notice">
          By signing up you agree our terms and your details will be used to match you with available accommodations.
        </div>

        <div class="links">
          <a class="link" href="login.html">Already have an account? <strong>Log in</strong></a>
        </div>
      </form>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script src="scripts/register.js"></script>
</body>
</html>
