<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - ACCOFINDER</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .step { display: none; }
    .step.active { display: block; }
    .channel-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 4px 0; }
    .channel-btn { padding: 14px; border: 2px solid var(--border); border-radius: 10px; background: #fff; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text-sec); text-align: center; transition: border-color .15s, color .15s; }
    .channel-btn:hover, .channel-btn.selected { border-color: var(--fb-blue); color: var(--fb-blue); }
    .channel-btn.selected { background: #e8f0fe; }
    .otp-inputs { display: flex; gap: 8px; justify-content: center; margin: 8px 0; }
    .otp-inputs input { width: 44px; height: 52px; text-align: center; font-size: 22px; font-weight: 800; padding: 0; }
    .resend-row { text-align: center; font-size: 12px; color: var(--text-sec); margin-top: 4px; }
    .resend-row a { color: var(--fb-blue); cursor: pointer; font-weight: 700; }
    .error-banner { background: #fff0f0; border: 1px solid #fcc; border-radius: 10px; color: #c0392b; font-size: 13px; padding: 10px 12px; margin-bottom: 8px; display: none; }
    .success-banner { background: #f0fff4; border: 1px solid #b2dfdb; border-radius: 10px; color: #1a7a4a; font-size: 13px; padding: 10px 12px; margin-bottom: 8px; display: none; }
    .step-indicator { display: flex; gap: 6px; margin-bottom: 16px; }
    .step-dot { height: 4px; flex: 1; border-radius: 4px; background: var(--border); }
    .step-dot.done { background: var(--fb-blue); }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-badge">A</div>
          <div>
            <div style="font-size:14px;line-height:1.1;">ACCOFINDER</div>
            <div style="font-size:12px;color:var(--text-sec);font-weight:700;">Accommodation System</div>
          </div>
        </div>
      </div>

      <div class="step-indicator">
        <div class="step-dot done" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
      </div>

      <div id="errorBanner" class="error-banner"></div>
      <div id="successBanner" class="success-banner"></div>

      <div class="step active" id="step1">
        <h1 class="title">Forgot password?</h1>
        <p class="subtitle">Enter your email and choose how to receive your code.</p>
        <div class="field">
          <label for="email">Email address</label>
          <input id="email" type="email" placeholder="Email address" required />
        </div>
        <div class="field" style="margin-top:4px;">
          <label>Send code via</label>
          <div class="channel-options">
            <button type="button" class="channel-btn selected" data-channel="email">📧 Email</button>
            <button type="button" class="channel-btn" data-channel="sms">📱 SMS</button>
          </div>
        </div>
        <button class="primary-btn" id="sendCodeBtn" style="margin-top:10px;">Send code</button>
        <div class="links"><a class="link" href="login.html">← Back to login</a></div>
      </div>

      <div class="step" id="step2">
        <h1 class="title">Enter your code</h1>
        <p class="subtitle" id="otpSubtitle">We sent a 6-digit code to your email.</p>
        <div class="otp-inputs">
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" />
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" />
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" />
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" />
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" />
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" />
        </div>
        <div class="resend-row">Didn't receive it? <a id="resendLink">Resend code</a></div>
        <button class="primary-btn" id="verifyBtn" style="margin-top:12px;">Verify code</button>
      </div>

      <div class="step" id="step3">
        <h1 class="title">New password</h1>
        <p class="subtitle">Choose a strong password for your account.</p>
        <div class="field">
          <label for="newPassword">New password</label>
          <input id="newPassword" type="password" placeholder="New password" minlength="6" required />
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" type="password" placeholder="Confirm password" minlength="6" required />
          <div class="hint" id="passwordHint" style="display:none;">Passwords do not match.</div>
        </div>
        <button class="primary-btn" id="resetBtn" style="margin-top:4px;">Reset password</button>
      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script src="scripts/forgot-password.js"></script>
</body>
</html>
