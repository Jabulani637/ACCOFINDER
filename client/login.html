<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ACCOFINDER</title>
  <link rel="stylesheet" href="stylesheet.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-badge">A</div>
          <div>
            <div style="font-size:14px; line-height:1.1;">ACCOFINDER</div>
            <div style="font-size:12px; color:var(--muted); font-weight:700;">Accommodation System</div>
          </div>
        </div>
      </div>

      <h1 class="title">Log in</h1>
      <p class="subtitle">Welcome back. Sign in to continue.</p>

      <!--
        NOTE:
        - Hook up your backend endpoint via form action/method.
        - Current action points to /login (adjust to match your server).
      -->
      <form id="loginForm" action="/login" method="POST" autocomplete="on">
        <div class="field">
          <label for="email">Mobile number or email</label>
          <input id="email" name="email" type="email" placeholder="Email address" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Password" required minlength="6" />
        </div>

        <button class="primary-btn" type="submit">Log in</button>

        <div class="notice">
          Don’t have an account?
        </div>

        <div class="links">
          <a class="link" href="register.html">Create account</a>
        </div>
      </form>
    </div>
  </div>

  <script src="scripts/login.js"></script>
</body>
</html>
